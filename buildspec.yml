version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  build:
    commands:
      - echo "Building project..."
      - mvn clean package

  post_build:
    commands:
      - echo "Preparing deployment artifacts..."

      - mkdir -p artifacts

      # Create Lambda Layer
      - cd target/layer
      - zip -r ../../artifacts/Layer.zip .
      - cd ../..

      # Copy remaining files
      - cp target/employee-api-1.0.jar artifacts/
      - cp template.yml artifacts/
      - cp openapi.json artifacts/

      # Upload to S3
      - aws s3 cp artifacts/employee-api-1.0.jar s3://my-demo-bucket-10102004/employee-api-1.0.jar
      - aws s3 cp artifacts/Layer.zip s3://my-demo-bucket-10102004/Layer.zip
      - aws s3 cp artifacts/template.yml s3://my-demo-bucket-10102004/template.yml
      - aws s3 cp artifacts/openapi.json s3://my-demo-bucket-10102004/openapi.json

artifacts:
  base-directory: artifacts
  files:
    - '**/*'