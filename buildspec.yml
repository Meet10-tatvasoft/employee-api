version: 0.2

phases:

  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Installing AWS SAM CLI..."
      - pip3 install --upgrade pip
      - pip3 install aws-sam-cli
      - sam --version

  build:
    commands:
      - echo "Building Java application and Lambda Layer contents via Maven..."
      - mvn clean package
      - echo "Verifying build outputs..."
      - test -f target/employee-api-1.0.jar
      - test -d target/layer/java/lib

  post_build:
    commands:
      - echo "Checking required environment variables..."
      - |
        if [ -z "$ARTIFACT_BUCKET" ]; then
          echo "ERROR: ARTIFACT_BUCKET environment variable is not set on this CodeBuild project."
          exit 1
        fi

      - echo "Validating SAM template..."
      - sam validate --template-file template.yml

      - echo "Running sam build..."
      - sam build --template-file template.yml

      - echo "Running sam package (build + upload artifacts, no deploy)..."
      - sam package
        --template-file .aws-sam/build/template.yaml
        --s3-bucket "$ARTIFACT_BUCKET"
        --s3-prefix employee-api
        --output-template-file packaged-template.yml

      - echo "---------------- PACKAGED TEMPLATE ----------------"
      - cat packaged-template.yml
      - echo "-----------------------------------------------------"

artifacts:
  files:
    - packaged-template.yml