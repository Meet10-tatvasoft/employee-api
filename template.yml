AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Employee API (AWS SAM) - Lambda + Layer + API Gateway via OpenAPI

Parameters:

  FunctionName:
    Type: String
    Default: EmployeeApi

  LayerName:
    Type: String
    Default: EmployeeApiDependenciesLayer

  StageName:
    Type: String
    Default: dev

Globals:
  Function:
    Runtime: java17
    Timeout: 30
    MemorySize: 512

Resources:

  EmployeeLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EmployeeLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  EmployeeDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Ref LayerName
      Description: Common runtime dependencies
      ContentUri: target/layer/
      CompatibleRuntimes:
        - java17
      RetentionPolicy: Retain

  EmployeeApiFunction:
    Type: AWS::Serverless::Function
    # CodeUri points at an already-built JAR (produced by our own Maven step),
    # not a source folder. SkipBuild tells `sam build` to carry it forward
    # as-is instead of trying to run a Java build workflow against it.
    Metadata:
      SkipBuild: true
    Properties:
      FunctionName: !Ref FunctionName
      CodeUri: target/employee-api-1.0.jar
      Handler: com.demo.handler.EmployeeApiHandler::handleRequest
      Role: !GetAtt EmployeeLambdaRole.Arn
      Layers:
        - !Ref EmployeeDependenciesLayer

  EmployeeApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: Employee API
      StageName: !Ref StageName
      EndpointConfiguration:
        Type: REGIONAL
      # DefinitionUri does not support intrinsic functions inside the
      # referenced file. DefinitionBody + AWS::Include splices openapi.json
      # into the template itself before evaluation, so the Fn::Sub blocks
      # inside it resolve normally. `sam package` uploads the local file
      # referenced by Location automatically (documented behavior of the
      # AWS::Include transform's Location parameter).
      DefinitionBody:
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: openapi.json

  # Not auto-generated by SAM because the API comes from an external OpenAPI
  # document rather than Function-level "Events" - SAM only auto-wires this
  # permission when it sees an explicit Api event source on the function.
  EmployeeApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref EmployeeApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EmployeeApi}/*/*/*

Outputs:

  LambdaArn:
    Description: Employee API Lambda function ARN
    Value: !GetAtt EmployeeApiFunction.Arn

  ApiId:
    Description: API Gateway REST API ID
    Value: !Ref EmployeeApi

  InvokeURL:
    Description: Invoke URL for the deployed stage
    Value: !Sub https://${EmployeeApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}